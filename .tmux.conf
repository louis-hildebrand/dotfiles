set -g default-terminal "xterm-256color"
set -g escape-time 50

set -g mouse on

# Use Ctrl+Space instead of Ctrl+B as the leader key
unbind C-b
set -g prefix C-Space
bind C-Space send-prefix

# Number windows and panes starting at 1, not 0
set -g base-index 1
setw -g pane-base-index 1

# Don't create a login session
set -g default-command "$SHELL -i"

# Use vim scheme for navigating while in copy mode
setw -g mode-keys vi

# Stay in same directory when creating new windows and panes
bind 'c' new-window      -c "#{pane_current_path}"
bind '"' split-window -v -c "#{pane_current_path}"
bind '%' split-window -h -c "#{pane_current_path}"

bind-key Up    select-pane -U
bind-key Down  select-pane -D
bind-key Left  select-pane -L
bind-key Right select-pane -R

# Copy to system clipboard
bind-key -T copy-mode-vi Enter              send-keys -X copy-pipe-and-cancel "xclip -selection clipboard"
bind-key -T copy-mode-vi MouseDragEnd1Pane  send-keys -X copy-pipe-and-cancel "xclip -selection clipboard"
